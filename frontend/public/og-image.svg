<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00ff66" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00ff66" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00ff66" stop-opacity="0"/>
    </linearGradient>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="lineGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04">
    <line x1="0" y1="157" x2="1200" y2="157" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="472" x2="1200" y2="472" stroke="#fff" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="630" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Decorative chart line -->
  <path d="M0,420 Q150,400 300,380 T500,340 T700,280 T900,250 T1200,200"
        fill="none" stroke="#00ff66" stroke-width="2.5" opacity="0.6" filter="url(#lineGlow)"/>
  <path d="M0,630 L0,420 Q150,400 300,380 T500,340 T700,280 T900,250 T1200,200 L1200,630 Z"
        fill="#00ff66" opacity="0.03"/>

  <!-- Logo "S" -->
  <rect x="100" y="200" width="64" height="64" rx="16" fill="#00ff66" opacity="0.9"/>
  <text x="132" y="248" font-family="sans-serif" font-size="36" font-weight="900" fill="#050505" text-anchor="middle">S</text>

  <!-- Title -->
  <text x="190" y="228" font-family="'Space Grotesk', sans-serif" font-size="52" font-weight="700" fill="#ffffff" letter-spacing="-0.02em">Stocky Fun</text>

  <!-- Tagline -->
  <text x="192" y="260" font-family="'Space Grotesk', sans-serif" font-size="18" fill="#888888" letter-spacing="0.05em" text-transform="uppercase">AI-POWERED CRYPTO TRADING DASHBOARD</text>

  <!-- Feature pills -->
  <g font-family="'Inter', sans-serif" font-size="14" font-weight="500">
    <rect x="100" y="310" width="140" height="36" rx="18" fill="#00ff66" opacity="0.1" stroke="#00ff66" stroke-opacity="0.3" stroke-width="1"/>
    <text x="170" y="333" fill="#00ff66" text-anchor="middle">AI Signals</text>

    <rect x="260" y="310" width="160" height="36" rx="18" fill="#3b82f6" opacity="0.1" stroke="#3b82f6" stroke-opacity="0.3" stroke-width="1"/>
    <text x="340" y="333" fill="#60a5fa" text-anchor="middle">Live Charts</text>

    <rect x="440" y="310" width="180" height="36" rx="18" fill="#a855f7" opacity="0.1" stroke="#a855f7" stroke-opacity="0.3" stroke-width="1"/>
    <text x="530" y="333" fill="#c084fc" text-anchor="middle">Paper Trading</text>

    <rect x="640" y="310" width="200" height="36" rx="18" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-opacity="0.3" stroke-width="1"/>
    <text x="740" y="333" fill="#fbbf24" text-anchor="middle">Technical Analysis</text>
  </g>

  <!-- Coins -->
  <g font-family="'JetBrains Mono', monospace" font-size="13" font-weight="600">
    <text x="100" y="395" fill="#555555">BTC · ETH · SOL · BNB · HYPE</text>
  </g>

  <!-- URL -->
  <text x="100" y="560" font-family="'JetBrains Mono', monospace" font-size="16" fill="#333333">fun.stockyai.xyz</text>

  <!-- Neon accent line -->
  <rect x="100" y="430" width="200" height="2" fill="url(#glow)" filter="url(#lineGlow)" opacity="0.8"/>
</svg>
