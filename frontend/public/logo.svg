<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 48" width="280" height="48">
  <defs>
    <linearGradient id="iconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f0f"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="iconAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff66"/>
      <stop offset="100%" stop-color="#00cc52"/>
    </linearGradient>
    <filter id="iconGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Icon mark -->
  <rect x="2" y="4" width="40" height="40" rx="10" fill="url(#iconBg)"/>
  <rect x="2" y="4" width="40" height="40" rx="10" fill="none" stroke="#222222" stroke-width="0.8"/>
  <!-- Chart line in icon -->
  <path d="M10,32 L15,29 L20,25 L25,28 L30,20 L35,16 L38,13" fill="none" stroke="url(#iconAccent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#iconGlow)" opacity="0.7"/>
  <path d="M10,32 L15,29 L20,25 L25,28 L30,20 L35,16 L38,13 L38,38 L10,38 Z" fill="#00ff66" opacity="0.06"/>
  <!-- "S" in icon -->
  <text x="22" y="33" font-family="'Arial Black', 'Helvetica Neue', sans-serif" font-size="22" font-weight="900" text-anchor="middle" fill="#00ff66" filter="url(#iconGlow)">S</text>

  <!-- Wordmark -->
  <text x="54" y="33" font-family="'Space Grotesk', 'Inter', sans-serif" font-size="26" font-weight="700" fill="#ffffff" letter-spacing="-0.02em">Stocky</text>
  <text x="166" y="33" font-family="'Space Grotesk', 'Inter', sans-serif" font-size="26" font-weight="700" fill="#00ff66" letter-spacing="-0.02em" filter="url(#textGlow)">Fun</text>
</svg>
